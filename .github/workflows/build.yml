name: MoodFlow Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  # ===========================================================================
  # ANDROID BUILD
  # ===========================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Backup source files
        run: |
          cp lib/main.dart /tmp/main.dart.backup
          cp pubspec.yaml /tmp/pubspec.yaml.backup

      - name: Create Flutter project structure
        run: |
          flutter create --platforms=android --org com.moodflow .
          
      - name: Restore source files
        run: |
          cp /tmp/main.dart.backup lib/main.dart
          cp /tmp/pubspec.yaml.backup pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Build APK (universal)
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: error

  # ===========================================================================
  # WINDOWS BUILD
  # ===========================================================================
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Backup source files
        shell: bash
        run: |
          cp lib/main.dart /tmp/main.dart.backup
          cp pubspec.yaml /tmp/pubspec.yaml.backup

      - name: Create Flutter project structure
        run: |
          flutter create --platforms=windows --org com.moodflow .
          
      - name: Restore source files
        shell: bash
        run: |
          cp /tmp/main.dart.backup lib/main.dart
          cp /tmp/pubspec.yaml.backup pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $source = "build\windows\x64\runner\Release"
          $destination = "MoodFlow-Windows-Portable.zip"
          Compress-Archive -Path "$source\*" -DestinationPath $destination -Force
          Write-Host "Created: $destination"
          Get-ChildItem $destination | Select-Object Name, Length

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: MoodFlow-Windows-Portable.zip
          retention-days: 90
          if-no-files-found: error

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/**
          retention-days: 90
          if-no-files-found: error

  # ===========================================================================
  # WEB BUILD
  # ===========================================================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Backup source files
        run: |
          cp lib/main.dart /tmp/main.dart.backup
          cp pubspec.yaml /tmp/pubspec.yaml.backup

      - name: Create Flutter project structure
        run: |
          flutter create --platforms=web --org com.moodflow .
          
      - name: Restore source files
        run: |
          cp /tmp/main.dart.backup lib/main.dart
          cp /tmp/pubspec.yaml.backup pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Web (release)
        run: |
          flutter build web \
            --release \
            --base-href /${{ github.event.repository.name }}/ \
            --web-renderer canvaskit

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/**
          retention-days: 90
          if-no-files-found: error

      # Deploy to GitHub Pages (only on push to main)
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true

  # ===========================================================================
  # GITHUB RELEASE (only on tags)
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts/ -type f | sort
          echo "==========================="

      - name: Prepare release files
        run: |
          mkdir -p release-files

          # Copy APKs
          cp artifacts/android-apk/*.apk release-files/ 2>/dev/null || true

          # Copy Windows ZIP
          cp artifacts/windows-portable/MoodFlow-Windows-Portable.zip release-files/ 2>/dev/null || true

          # Create Web ZIP
          cd artifacts/web-build && zip -r ../../release-files/MoodFlow-Web.zip . && cd ../..

          echo "=== Release Files ==="
          ls -lh release-files/
          echo "====================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
