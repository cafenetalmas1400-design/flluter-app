name: MoodFlow Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'
  PROJECT_NAME: 'moodflow'

jobs:
  # ===========================================================================
  # ANDROID BUILD
  # ===========================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Backup source files
        run: |
          cp lib/main.dart /tmp/main.dart.backup
          cp pubspec.yaml /tmp/pubspec.yaml.backup

      - name: Create Flutter project structure (Android)
        run: |
          flutter create \
            --platforms=android \
            --project-name=${{ env.PROJECT_NAME }} \
            --org com.moodflow \
            .

      - name: Restore source files
        run: |
          mkdir -p lib
          cp /tmp/main.dart.backup lib/main.dart
          cp /tmp/pubspec.yaml.backup pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build APK (universal)
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 90
          if-no-files-found: error

  # ===========================================================================
  # WINDOWS BUILD
  # ===========================================================================
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Check Visual Studio version
        shell: pwsh
        run: |
          Write-Host "=== Visual Studio Installation ==="
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (Test-Path $vswhere) {
            & $vswhere -latest -property installationPath
            & $vswhere -latest -property catalog_productLineVersion
          } else {
            Write-Host "vswhere not found"
          }

      - name: Backup source files
        shell: bash
        run: |
          mkdir -p /tmp/backup
          cp lib/main.dart /tmp/backup/main.dart
          cp pubspec.yaml /tmp/backup/pubspec.yaml

      - name: Create Flutter project structure (Windows)
        run: |
          flutter create --platforms=windows --project-name=${{ env.PROJECT_NAME }} --org com.moodflow .
        continue-on-error: true

      - name: Configure CMake for Visual Studio 2022
        shell: pwsh
        run: |
          $cmakeFile = "windows\CMakeLists.txt"
          if (Test-Path $cmakeFile) {
            Write-Host "=== Patching CMakeLists.txt for VS 2022 ==="
            
            # Read the file
            $content = Get-Content $cmakeFile -Raw
            
            # Replace Visual Studio 16 2019 with Visual Studio 17 2022
            $content = $content -replace 'Visual Studio 16 2019', 'Visual Studio 17 2022'
            
            # Write back
            Set-Content $cmakeFile $content -NoNewline
            
            Write-Host "CMakeLists.txt patched successfully"
            Write-Host "=== First 20 lines ==="
            Get-Content $cmakeFile | Select-Object -First 20
          } else {
            Write-Error "CMakeLists.txt not found at $cmakeFile"
            exit 1
          }

      - name: Set CMake generator environment variable
        shell: pwsh
        run: |
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV
          Write-Host "=== Environment Variables ==="
          Write-Host "CMAKE_GENERATOR=$env:CMAKE_GENERATOR"
          Write-Host "CMAKE_GENERATOR_PLATFORM=$env:CMAKE_GENERATOR_PLATFORM"

      - name: Restore source files
        shell: bash
        run: |
          mkdir -p lib
          cp /tmp/backup/main.dart lib/main.dart
          cp /tmp/backup/pubspec.yaml pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Clean build directory
        run: flutter clean

      - name: Build Windows (release)
        run: flutter build windows --release --verbose
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
          CMAKE_GENERATOR_PLATFORM: x64

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $source = "build\windows\x64\runner\Release"
          $destination = "MoodFlow-Windows-Portable.zip"
          
          if (Test-Path $source) {
            Compress-Archive -Path "$source\*" -DestinationPath $destination -Force
            Write-Host "✅ Created: $destination"
            Get-ChildItem $destination | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}
          } else {
            Write-Error "❌ Windows build directory not found: $source"
            Write-Host "=== Available directories ==="
            Get-ChildItem build -Recurse -Directory | Select-Object FullName
            exit 1
          }

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: MoodFlow-Windows-Portable.zip
          retention-days: 90
          if-no-files-found: error

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/**
          retention-days: 90
          if-no-files-found: error

  # ===========================================================================
  # WEB BUILD
  # ===========================================================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Backup source files
        run: |
          cp lib/main.dart /tmp/main.dart.backup
          cp pubspec.yaml /tmp/pubspec.yaml.backup

      - name: Create Flutter project structure (Web)
        run: |
          flutter create \
            --platforms=web \
            --project-name=${{ env.PROJECT_NAME }} \
            --org com.moodflow \
            .
        continue-on-error: true

      - name: Restore source files
        run: |
          mkdir -p lib
          cp /tmp/main.dart.backup lib/main.dart
          cp /tmp/pubspec.yaml.backup pubspec.yaml

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build Web (release)
        run: |
          flutter build web \
            --release \
            --base-href /${{ github.event.repository.name }}/ \
            --web-renderer canvaskit

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/**
          retention-days: 90
          if-no-files-found: error

      # Deploy to GitHub Pages (only on push to main)
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true

  # ===========================================================================
  # GITHUB RELEASE (only on tags)
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts/ -type f | sort
          echo "==========================="

      - name: Prepare release files
        run: |
          mkdir -p release-files
          
          # Copy APKs
          cp artifacts/android-apk/*.apk release-files/ 2>/dev/null || echo "No APKs found"
          
          # Copy Windows ZIP
          cp artifacts/windows-portable/MoodFlow-Windows-Portable.zip release-files/ 2>/dev/null || echo "No Windows ZIP found"
          
          # Create Web ZIP
          if [ -d "artifacts/web-build" ]; then
            cd artifacts/web-build && zip -r ../../release-files/MoodFlow-Web.zip . && cd ../..
          else
            echo "No Web build found"
          fi
          
          echo "=== Release Files ==="
          ls -lh release-files/
          echo "====================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
